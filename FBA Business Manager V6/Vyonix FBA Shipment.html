<!doctype html>
<html lang="en">
  <head>

    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Vyonix · FBA Shipment</title>
    <meta name="description" content="Vyonix Business OS — FBA inbound detail." />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap"
    />

    <link rel="stylesheet" href="vy-app.css" />
    <style>
      .fba-two-col { display: grid; grid-template-columns: 1.4fr 1fr; gap: 16px; align-items: start; }

        <rect x="0" y="0" width="100" height="100" fill="hsl(42 25% 96%)" />
        <rect x="22" y="22" width="56" height="56" rx="12" fill="hsl(24.6 95% 53.1%)" />
        <text x="50" y="62" text-anchor="middle" font-family="ui-monospace,Menlo,monospace" font-weight="900" font-size="34" fill="white">V</text>
      </svg>
    </template>

    <!-- React + Babel -->
    <script
      src="https://unpkg.com/react@18.3.1/umd/react.development.js"
      integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L"
      crossorigin="anonymous"
    ></script>
    <script

    <script type="text/babel" src="vy-shell.jsx"></script>
    <script type="text/babel" src="logistics-data.jsx"></script>

    <script type="text/babel" src="fba-app.jsx"></script>
